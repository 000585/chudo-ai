version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: chudo-ai-db-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: chudo
      POSTGRES_PASSWORD: chudo_secure_password_2024
      POSTGRES_DB: chudo_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chudo -d chudo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chudo-network

  redis:
    image: redis:7-alpine
    container_name: chudo-ai-redis-1
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "-a", "${REDIS_PASSWORD}", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chudo-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chudo-ai-backend-1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chudo:chudo_secure_password_2024@db:5432/chudo_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - app_logs:/app/logs
    networks:
      - chudo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  app_logs:

networks:
  chudo-network:
    driver: bridge